<!DOCTYPE html>
<html>
<head>
    <title>GitHub Proxy</title>
</head>
<body>
    <h3>Enter URL:</h3>
    <input type="text" id="target" style="width:400px" placeholder="https://google.com">
    <button onclick="fetchPage()">Load</button>
    <div id="output" style="margin-top:20px; border:1px solid #ccc; padding:10px; min-height:400px; overflow:auto;"></div>
    
    <script>
        async function fetchPage() {
            let url = document.getElementById('target').value;
            if (!url.startsWith('http')) url = 'https://' + url;
            
            // استفاده از سرویس allorigins (معمولاً باز است)
            const proxy = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(url);
            
            try {
                const response = await fetch(proxy);
                const html = await response.text();
                document.getElementById('output').innerHTML = html;
                
                // درست کردن لینک‌های نسبی
                const base = document.createElement('base');
                base.href = url;
                document.getElementById('output').prepend(base);
            } catch(e) {
                document.getElementById('output').innerHTML = 'Error: ' + e.message;
            }
        }
    </script>
</body>
</html>
