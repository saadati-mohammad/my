<!DOCTYPE html>
<html>
<head>
    <title>Simple Proxy via GitHub</title>
    <style>
        body { font-family: monospace; max-width: 900px; margin: 20px auto; padding: 20px; }
        input { width: 80%; padding: 8px; }
        button { padding: 8px 16px; background: #28a745; color: white; border: none; cursor: pointer; }
        pre { background: #f4f4f4; padding: 10px; overflow: auto; max-height: 70vh; white-space: pre-wrap; }
    </style>
</head>
<body>
    <h2>GitHub Raw Proxy</h2>
    <input type="text" id="url" placeholder="https://google.com" style="width:70%">
    <button onclick="fetchURL()">Fetch</button>
    <hr>
    <pre id="output">نتایج اینجا نمایش داده می‌شود...</pre>

    <script>
        async function fetchURL() {
            let target = document.getElementById('url').value;
            if (!target.startsWith('http')) target = 'https://' + target;
            
            const rawProxy = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(target);
            
            try {
                const response = await fetch(rawProxy);
                const text = await response.text();
                
                // نمایش به صورت متن خام
                document.getElementById('output').textContent = text;
                
                // اگر HTML بود، می‌توانید به صورت رندر شده هم ببینید
                const rendered = document.createElement('div');
                rendered.innerHTML = text;
                // تبدیل لینک‌های نسبی به مطلق
                rendered.querySelectorAll('a').forEach(a => {
                    if (a.href && !a.href.startsWith('http')) {
                        try {
                            a.href = new URL(a.getAttribute('href'), target).href;
                        } catch(e) {}
                    }
                });
                
                // نمایش رندر شده در کنار متن خام
                const iframe = document.createElement('iframe');
                iframe.style.width = '100%';
                iframe.style.height = '500px';
                iframe.srcdoc = text;
                document.getElementById('output').after(iframe);
                
            } catch(error) {
                document.getElementById('output').textContent = 'Error: ' + error.message;
            }
        }
    </script>
</body>
</html>
