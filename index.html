<!DOCTYPE html>
<html>
<head>
    <title>Proxy</title>
    <style>
        body { font-family: Arial; max-width: 800px; margin: 50px auto; padding: 20px; }
        input { width: 100%; padding: 10px; margin: 10px 0; font-size: 16px; }
        iframe { width: 100%; height: 70vh; border: 1px solid #ccc; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <h2>Personal Proxy via GitHub</h2>
    <input type="text" id="url" placeholder="Enter URL (e.g., https://google.com)" value="https://google.com">
    <button onclick="loadPage()">Go</button>
    <iframe id="proxyFrame" sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-same-origin"></iframe>
    <script>
        function loadPage() {
            let targetUrl = document.getElementById('url').value;
            if (!targetUrl.startsWith('http')) targetUrl = 'https://' + targetUrl;
            
            // استفاده از CORS proxy خارجی (این یکی ممکن است محدود باشد)
            const proxyUrl = 'https://api.allorigins.win/get?url=' + encodeURIComponent(targetUrl);
            
            fetch(proxyUrl)
                .then(response => response.json())
                .then(data => {
                    const iframe = document.getElementById('proxyFrame');
                    const doc = iframe.contentDocument || iframe.contentWindow.document;
                    doc.open();
                    doc.write(data.contents);
                    doc.close();
                })
                .catch(err => {
                    alert('Error: ' + err.message + '\nTrying fallback...');
                    // Fallback: مستقیم iframe (شاید کار نکند)
                    document.getElementById('proxyFrame').src = targetUrl;
                });
        }
    </script>
</body>
</html>
